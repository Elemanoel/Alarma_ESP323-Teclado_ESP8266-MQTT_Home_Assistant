# ----------------------------------------------------------------
#  NOTIFICACIONES TELEGRAM
# ----------------------------------------------------------------

- id: alarma_intrusion
  alias: "Alarma — Intrusión detectada"
  description: "Notifica por Telegram cuando se dispara la alarma"
  trigger:
    - platform: mqtt
      topic: alarma/central/alerta
      payload: "INTRUSION_DETECTADA"
  action:
    - service: notify.telegram_alarma
      data:
        message: >
          🚨 *ALARMA DISPARADA*
          Zona: {{ states('sensor.alarma_zona_disparada') }}
          Hora: {{ now().strftime('%d/%m/%Y %H:%M:%S') }}
    # Foto de cámara si hay integrada (opcional — comentar si no aplica)
    # - service: notify.telegram_alarma
    #   data:
    #     message: "Foto de la cámara:"
    #     data:
    #       photo:
    #         - url: !secret camara_url

- id: alarma_armada_total
  alias: "Alarma — Armada total"
