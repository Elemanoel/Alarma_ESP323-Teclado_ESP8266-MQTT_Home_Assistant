# ----------------------------------------------------------------
#  CONTROL DESDE TELEGRAM
#  Requiere: telegram_bot configurado con webhook o polling
# ----------------------------------------------------------------

- id: alarma_telegram_comando
  alias: "Alarma — Comando desde Telegram"
  description: "Permite armar/desarmar desde Telegram con /alarma_arm, /alarma_home, /alarma_off"
  trigger:
    - platform: event
      event_type: telegram_command
      event_data:
        command: "/alarma_arm"
    - platform: event
      event_type: telegram_command
      event_data:
        command: "/alarma_home"
    - platform: event
      event_type: telegram_command
      event_data:
        command: "/alarma_off"
    - platform: event
      event_type: telegram_command
      event_data:
        command: "/alarma_estado"
  action:
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.command == '/alarma_arm' }}"
          sequence:
            - service: mqtt.publish
              data:
                topic: "alarma/ha/comando"
                payload: "ARM_AWAY"
            - service: notify.telegram_alarma
              data:
                message: "✅ Comando ARM_AWAY enviado"

        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.command == '/alarma_home' }}"
          sequence:
            - service: mqtt.publish
              data:
                topic: "alarma/ha/comando"
                payload: "ARM_HOME"
            - service: notify.telegram_alarma
              data:
                message: "✅ Comando ARM_HOME enviado"

        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.command == '/alarma_off' }}"
          sequence:
            - service: mqtt.publish
              data:
                topic: "alarma/ha/comando"
                payload: "DISARM"
            - service: notify.telegram_alarma
              data:
                message: "✅ Comando DISARM enviado"

        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.command == '/alarma_estado' }}"
          sequence:
            - service: mqtt.publish
              data:
                topic: "alarma/ha/comando"
                payload: "GET_STATE"
            - service: notify.telegram_alarma
              data:
                message: >
                  📊 *Estado actual:*
                  Panel: {{ states('sensor.alarma_estado') }}
                  Zona disparada: {{ states('sensor.alarma_zona_disparada') }}
                  Alimentación 220V: {{ states('binary_sensor.alarma_alimentacion_220v') }}
